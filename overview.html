<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>현황 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:#f0f4fa;color:#0f2747;font-size:14px;padding:24px;overflow-y:auto;}

/* ── 공통 섹션 래퍼 ── */
.dash-section{background:#fff;border:1px solid #e4eaf5;border-radius:16px;box-shadow:0 2px 8px rgba(15,39,71,.05);margin-bottom:20px;overflow:hidden;}
.dash-section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e4eaf5;gap:12px;flex-wrap:wrap;min-height:52px;}
.dash-section-title{font-size:14px;font-weight:800;color:#0f2747;display:flex;align-items:center;gap:8px;}
.dash-section-title::before{content:'';width:4px;height:16px;background:#2563EB;border-radius:99px;flex-shrink:0;}
.dash-section-body{padding:20px;}

/* ── 필터 컨트롤 공통 ── */
.filter-ctrl{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.scope-btn{padding:5px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #e4eaf5;background:#f7f9fd;color:#64748B;transition:all .12s;font-family:inherit;}
.scope-btn.active{border-color:#2563EB;background:#EFF6FF;color:#2563EB;}
.period-btn{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #e4eaf5;background:#f7f9fd;color:#64748B;transition:all .12s;font-family:inherit;}
.period-btn.active{border-color:#2563EB;background:#EFF6FF;color:#2563EB;}
.nodeny-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;padding:5px 12px;border-radius:8px;border:1.5px solid #FDE68A;background:#FEF3C7;transition:all .15s;user-select:none;}
.nodeny-toggle:hover{background:#FDE68A;}
.nodeny-toggle.active{background:#F59E0B;border-color:#F59E0B;}
.nodeny-toggle input[type=checkbox]{accent-color:#F59E0B;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.nodeny-toggle-label{font-size:12px;font-weight:700;color:#92400E;}
.nodeny-toggle.active .nodeny-toggle-label{color:#fff;}

/* 날짜 범위 피커 */
.date-range-wrap{position:relative;display:inline-flex;align-items:center;}
.date-range-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #e4eaf5;background:#f7f9fd;color:#64748B;font-family:inherit;white-space:nowrap;}
.date-range-btn.active{border-color:#2563EB;background:#EFF6FF;color:#2563EB;}
.date-picker-popup{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #e4eaf5;border-radius:12px;box-shadow:0 8px 24px rgba(15,39,71,.12);padding:14px;z-index:100;min-width:260px;display:none;}
.date-picker-popup.show{display:block;}
.dp-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dp-label{font-size:11px;font-weight:700;color:#64748B;width:32px;}
.dp-input{flex:1;padding:6px 10px;border:1.5px solid #e4eaf5;border-radius:8px;font-size:12px;font-family:inherit;color:#0f2747;outline:none;}
.dp-input:focus{border-color:#2563EB;}
.dp-actions{display:flex;gap:6px;margin-top:4px;}
.dp-btn{flex:1;padding:7px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.dp-apply{background:#2563EB;color:white;}.dp-cancel{background:#F1F5F9;color:#64748B;}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi-card{background:#f7f9fd;border:1px solid #e4eaf5;border-radius:12px;padding:18px;}
.kpi-label{font-size:11px;font-weight:600;color:#94A3B8;margin-bottom:6px;}
.kpi-value{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:5px;}
.kpi-value.blue{color:#2563EB;}.kpi-value.green{color:#16A34A;}.kpi-value.orange{color:#D97706;}
.kpi-sub{font-size:11px;color:#94A3B8;}
.progress-track{height:5px;background:#e4eaf5;border-radius:99px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;border-radius:99px;transition:width .8s;}
.progress-fill.blue{background:linear-gradient(90deg,#2563EB,#60A5FA);}
.progress-fill.green{background:linear-gradient(90deg,#16A34A,#4ADE80);}
.progress-fill.orange{background:linear-gradient(90deg,#D97706,#FCD34D);}

/* ── 추이 차트 ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.chart-card{background:#f7f9fd;border:1px solid #e4eaf5;border-radius:12px;padding:16px;}
.chart-title{font-size:12px;font-weight:700;color:#0f2747;margin-bottom:3px;}
.chart-sub{font-size:11px;color:#94A3B8;margin-bottom:12px;}
.chart-wrap{position:relative;height:210px;}
.avg-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:7px;font-size:11px;font-weight:700;color:#2563EB;}
.avg-badge .label{color:#64748B;font-weight:500;}

/* ── 리드 모수 테이블 ── */
.selection-toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:#f7f9fd;border-bottom:1px solid #e4eaf5;min-height:42px;flex-wrap:wrap;}
.toolbar-hint{font-size:11px;color:#94A3B8;flex:1;}
.toolbar-count{font-size:12px;font-weight:700;color:#2563EB;}
.toolbar-detail{font-size:11px;color:#64748B;}
.toolbar-total{font-size:15px;font-weight:800;color:#2563EB;}
.btn-sm{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #e4eaf5;background:#fff;color:#64748B;font-family:inherit;transition:all .12s;}
.btn-sm:hover{background:#EFF6FF;color:#2563EB;border-color:#BFDBFE;}
.btn-sm.danger{border-color:#FCA5A5;color:#DC2626;}
.btn-sm.danger:hover{background:#FEE2E2;}

.seg-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
.seg-table thead tr{background:#EFF6FF;}
.seg-table th{padding:10px 14px;font-size:11px;font-weight:700;color:#1e3a8a;text-align:left;border-bottom:1px solid #dbe7f5;white-space:nowrap;overflow:hidden;}
.seg-table td{padding:12px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;overflow:hidden;}
.seg-table tr:last-child td{border-bottom:none;}
.seg-table tr:hover td{background:#f9fbff;}
.seg-table tr.selected-row td{background:#EFF6FF !important;}
.seg-table tr.nodeny-row td{background:#FFF7ED;}
.seg-table tr.nodeny-row:hover td{background:#FFEDD5;}
.seg-table input[type=checkbox]{accent-color:#2563EB;width:14px;height:14px;cursor:pointer;}
.seg-count{font-size:16px;font-weight:800;}
.seg-count.minus{color:#DC2626;}
.diff-badge{display:inline-flex;align-items:center;padding:1px 5px;border-radius:5px;font-size:10px;font-weight:700;margin-left:5px;background:#FEE2E2;color:#DC2626;}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap;}
.b-success{background:#DCFCE7;color:#16A34A;}.b-warning{background:#FEF3C7;color:#D97706;}
.b-danger{background:#FEE2E2;color:#DC2626;}.b-primary{background:#EFF6FF;color:#2563EB;}.b-gray{background:#F1F5F9;color:#64748B;}

.no-history{display:flex;flex-direction:column;align-items:center;justify-content:center;height:210px;gap:8px;color:#94A3B8;font-size:12px;}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px;color:#94A3B8;font-size:13px;}
.spinner{width:28px;height:28px;border:3px solid #e4eaf5;border-top-color:#2563EB;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div class="loading-wrap"><div class="spinner"></div><div>데이터 불러오는 중...</div></div></div>
<script>
Chart.defaults.font.family = "'Pretendard', sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.color = '#94A3B8';
Chart.register(ChartDataLabels);

// GitHub Pages에서 로컬 Python 서버 API를 호출하기 위한 설정
// 아래 주소를 실제 내 PC IPv4 주소로 변경하세요. 예: http://192.168.0.123:5010
const API_BASE = 'http://172.19.0.48:5010';
function apiUrl(path) {
  return API_BASE.replace(/\/$/, '') + path;
}


let chartKPI = null, _chartBar = null;
let allSnapshots  = [];
let currentPeriod = 'weekly';
let currentScope  = 'all';
let excludeNodeny = false;
let customRange   = null;
let _seg = null, _segBase = null, _segExcluded = null, _kpiTarget = 1500;
let _segAllBase = null, _segAllExcluded = null;  // 차트/테이블 전용 (항상 scope=all)

const SEG_COLORS = {
  honsa_done:'#4B5563', honsa_need:'#6B7280', done:'#16A34A',
  p2:'#2563EB', p3a:'#3B82F6', p3b:'#60A5FA', padd:'#93C5FD',
  p4:'#7DD3FC', separate:'#CBD5E1',
};
const ROW_DATA = [
  {key:'honsa_done',label:'0순위 (본사 완료)'}, {key:'honsa_need',label:'0순위 (본사 필요)'},
  {key:'done',label:'1순위 완료'}, {key:'p2',label:'2순위 (플랜A)'},
  {key:'p3a',label:'3순위a (플랜A)'}, {key:'p3b',label:'3순위b (플랜A)'},
  {key:'padd',label:'추가 (플랜A)'}, {key:'p4',label:'4순위 (플랜B)'},
  {key:'separate',label:'별도 (DB 미매칭)'},
];
let checkedRows = new Set();

// ── 체크박스 ──
function toggleRowCheck(key) {
  if (checkedRows.has(key)) checkedRows.delete(key);
  else checkedRows.add(key);
  const tr = document.getElementById('row_'+key);
  if (tr) tr.classList.toggle('selected-row', checkedRows.has(key));
  updateToolbar();
}
function selectAllRows() {
  ROW_DATA.forEach(r => {
    checkedRows.add(r.key);
    const tr = document.getElementById('row_'+r.key);
    if (tr) tr.classList.add('selected-row');
    const cb = document.querySelector(`#row_${r.key} input[type=checkbox]`);
    if (cb) cb.checked = true;
  });
  updateToolbar();
}
function clearAllChecks() {
  checkedRows.clear();
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = false);
  document.querySelectorAll('.seg-table tr.selected-row').forEach(tr => tr.classList.remove('selected-row'));
  updateToolbar();
}
function updateToolbar() {
  const hint  = document.getElementById('toolbarHint');
  const info  = document.getElementById('toolbarInfo');
  if (!hint || !info || !_seg) return;
  if (checkedRows.size === 0) {
    hint.style.display  = 'flex';
    info.style.display  = 'none';
    return;
  }
  hint.style.display = 'none';
  info.style.display = 'flex';
  let total = 0;
  const labels = [];
  checkedRows.forEach(key => {
    const count = key==='separate' ? (_seg.separate||14) : (_seg[key]||0);
    total += count;
    const r = ROW_DATA.find(r=>r.key===key);
    if (r) labels.push(`${r.label} ${count.toLocaleString()}건`);
  });
  document.getElementById('toolbarCount').textContent  = `${checkedRows.size}개 선택`;
  document.getElementById('toolbarTotal').textContent  = `합계 ${total.toLocaleString()}건`;
  document.getElementById('toolbarDetail').textContent = labels.join(' + ');
}

// ── 범위 필터 ──
function setScope(s) {
  currentScope = s;
  document.querySelectorAll('.scope-btn').forEach(b=>b.classList.toggle('active',b.dataset.scope===s));
  reloadSegments();
}

// ── 미동의 토글 — 차트/테이블은 all 기준, KPI 카드는 현재 scope 기준 ──
function toggleNodeny() {
  excludeNodeny = !excludeNodeny;
  document.getElementById('nodenyToggle').classList.toggle('active', excludeNodeny);
  document.getElementById('nodenyCheckbox').checked = excludeNodeny;

  // 차트/테이블용 all 기준 데이터
  const allSeg = excludeNodeny ? _segAllExcluded : _segAllBase;
  // KPI 카드용 현재 scope 기준 데이터
  const cardSeg = excludeNodeny ? _segExcluded : _segBase;

  if (allSeg && cardSeg) {
    updateKPICards(cardSeg, _kpiTarget);
    renderBarChart(allSeg);
    renderSegTable(allSeg, _kpiTarget);
    updateToolbar();
  } else {
    reloadAllData();
  }
}

function reloadSegments() {
  // scope 필터는 KPI 카드에만 적용 — 차트/테이블은 항상 전체(all) 기준 유지
  Promise.all([
    fetch(apiUrl(`/api/segments?scope=${currentScope}&exclude_nodeny=false`)).then(r=>r.json()),
    fetch(apiUrl(`/api/segments?scope=${currentScope}&exclude_nodeny=true`)).then(r=>r.json()),
  ]).then(([base, excl]) => {
    _segBase     = base.segments;
    _segExcluded = excl.segments;
    _kpiTarget   = base.kpi_target;
    _seg = excludeNodeny ? _segExcluded : _segBase;
    // KPI 카드만 업데이트
    updateKPICards(_seg, _kpiTarget);
    // scope 버튼 상태 유지
    document.querySelectorAll('.scope-btn').forEach(b=>b.classList.toggle('active',b.dataset.scope===currentScope));
  }).catch(console.error);
}

// ── KPI 카드 ──
function updateKPICards(seg, kpiTarget) {
  const isHonsa=currentScope==='honsa', isCenter=currentScope==='center', isAll=currentScope==='all';
  const doneCount = isHonsa?(seg.honsa_done||0):isCenter?seg.done:seg.done+(seg.honsa_done||0);
  const ownTotal  = isHonsa?(seg.honsa_total||0):isCenter?(seg.total-(seg.honsa_total||0)):kpiTarget;
  const convRate  = ownTotal>0?(doneCount/ownTotal*100).toFixed(1):0;
  const contribRate=(doneCount/kpiTarget*100).toFixed(1);
  const remaining = kpiTarget-(seg.done+(seg.honsa_done||0));
  const planACover= seg.plan_a>0?Math.min((seg.plan_a/Math.max(remaining,1)*100),100).toFixed(0):0;

  document.getElementById('kpiDoneLabel').textContent = isHonsa?'활성화 완료 (본사)':isCenter?'활성화 완료 (센터)':'활성화 완료 (전체)';
  document.getElementById('kpiDone').textContent      = doneCount.toLocaleString()+'건';
  document.getElementById('kpiDoneSub').textContent   = `KPI 대비 ${contribRate}%`;
  document.getElementById('kpiDoneBar').style.width   = Math.min(doneCount/kpiTarget*100,100)+'%';

  document.getElementById('kpiCard3Label').textContent = '담당 전환율';
  document.getElementById('kpiCard3Value').textContent = convRate+'%';
  document.getElementById('kpiCard3Sub').textContent   = isHonsa?`본사 담당 ${ownTotal}건 중 전환 완료`:isCenter?`센터 담당 ${ownTotal.toLocaleString()}건 중 전환 완료`:`전체 KPI ${kpiTarget.toLocaleString()}건 기준`;
  document.getElementById('kpiCard3Bar').style.width   = Math.min(convRate,100)+'%';

  if (isAll) {
    document.getElementById('kpiCard4Label').textContent = '플랜A 잔여 커버율';
    document.getElementById('kpiPlanA').textContent      = planACover+'%';
    document.getElementById('kpiPlanASub').textContent   = `플랜A ${seg.plan_a.toLocaleString()}건 → 잔여 ${remaining.toLocaleString()}건 대비`;
    document.getElementById('kpiPlanABar').style.width   = planACover+'%';
  } else {
    document.getElementById('kpiCard4Label').textContent = 'KPI 기여율';
    document.getElementById('kpiPlanA').textContent      = contribRate+'%';
    document.getElementById('kpiPlanASub').textContent   = isHonsa?`전체 KPI ${kpiTarget.toLocaleString()}건 대비 본사 기여`:`전체 KPI ${kpiTarget.toLocaleString()}건 대비 센터 기여`;
    document.getElementById('kpiPlanABar').style.width   = Math.min(contribRate,100)+'%';
  }
}

// ── 추이 그래프 ──
function setPeriod(p) {
  currentPeriod=p; customRange=null;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.dataset.period===p));
  document.querySelector('.date-range-btn')?.classList.remove('active');
  const btn=document.querySelector('.date-range-btn'); if(btn) btn.textContent='📅 기간 선택';
  closeDatePicker(); renderTrendChart(allSnapshots);
}
function toggleDatePicker(){document.getElementById('datePickerPopup').classList.toggle('show');}
function closeDatePicker(){document.getElementById('datePickerPopup')?.classList.remove('show');}
function applyDateRange(){
  const from=document.getElementById('dpFrom').value, to=document.getElementById('dpTo').value;
  if(!from||!to||from>to){alert('날짜 범위를 올바르게 입력해주세요.');return;}
  customRange={from,to};
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector('.date-range-btn');
  btn.classList.add('active'); btn.textContent=`📅 ${from.slice(5)} ~ ${to.slice(5)}`;
  closeDatePicker(); renderTrendChart(allSnapshots);
}
function filterSnapshots(snapshots){
  if(!snapshots.length) return [];
  const sorted=[...snapshots].sort((a,b)=>a.date.localeCompare(b.date));
  if(customRange) return sorted.filter(s=>s.date>=customRange.from&&s.date<=customRange.to);
  if(currentPeriod==='daily'){const cut=new Date();cut.setDate(cut.getDate()-14);return sorted.filter(s=>new Date(s.date)>=cut);}
  if(currentPeriod==='weekly'){const bw={};sorted.forEach(s=>{const wk=s.week_label||s.date.slice(0,7);bw[wk]=s;});return Object.values(bw).slice(-8);}
  if(currentPeriod==='monthly'){const bm={};sorted.forEach(s=>{bm[s.date.slice(0,7)]=s;});return Object.values(bm).slice(-6);}
  return sorted;
}
function fmtLabel(snap){
  if(currentPeriod==='weekly'&&snap.week_label) return snap.week_label;
  const dt=new Date(snap.date);
  if(currentPeriod==='daily'||customRange) return `${dt.getMonth()+1}/${dt.getDate()}`;
  if(currentPeriod==='monthly') return `${dt.getMonth()+1}월`;
  return snap.date;
}
function calcRecentAvg(snapshots){
  if(!snapshots.length) return null;
  const sorted=[...snapshots].sort((a,b)=>b.date.localeCompare(a.date));
  const cut=new Date();cut.setDate(cut.getDate()-14);
  const recent=sorted.filter(s=>new Date(s.date)>=cut);
  if(!recent.length) return null;
  const bw={};[...recent].reverse().forEach(s=>{const wk=s.week_label||s.date.slice(0,7);bw[wk]=s;});
  const weeks=Object.values(bw);
  if(weeks.length<2) return null;
  const last2=weeks.slice(-2);
  return {avg:Math.round(last2.reduce((s,w)=>s+w.done,0)/last2.length), weeks:last2.map(s=>s.week_label||s.date).join(' · ')};
}
function renderTrendChart(snapshots){
  if(chartKPI) chartKPI.destroy();
  const ctx=document.getElementById('chartKPI'); if(!ctx) return;
  const filtered=filterSnapshots(snapshots);
  const avgInfo=calcRecentAvg(snapshots);
  const avgEl=document.getElementById('recentAvg');
  if(avgEl){
    if(avgInfo){avgEl.innerHTML=`<span class="label">최근 2주 평균</span> ${avgInfo.avg.toLocaleString()}건 <span style="font-size:10px;color:#94A3B8">(${avgInfo.weeks})</span>`;avgEl.style.display='inline-flex';}
    else avgEl.style.display='none';
  }
  if(!filtered.length){ctx.parentElement.innerHTML=`<div class="no-history"><div style="font-size:32px">📭</div><div>아직 히스토리 데이터가 없습니다</div><div style="font-size:11px">스냅샷이 쌓이면 표시됩니다</div></div>`;return;}
  const labels=filtered.map(s=>fmtLabel(s)); const target=_kpiTarget;
  chartKPI=new Chart(ctx,{type:'line',data:{labels,datasets:[
    {label:'완료 건수',data:filtered.map(s=>s.done),borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,0.08)',borderWidth:2.5,pointBackgroundColor:'#2563EB',pointRadius:4,fill:true,tension:0.4},
    {label:`KPI 목표 ${target}건`,data:Array(labels.length).fill(target),borderColor:'#DC2626',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:14}},tooltip:{mode:'index',intersect:false},datalabels:{display:false}},
    scales:{y:{min:0,max:target+100,grid:{color:'#f1f5f9'},ticks:{stepSize:300}},x:{grid:{display:false}}}
  }});
}

// ── 잔여 모수 분포 차트 ──
function renderBarChart(seg){
  if(_chartBar) _chartBar.destroy();
  const ctx=document.getElementById('chartBar'); if(!ctx) return;
  const items=[
    {label:'0순위\n(본사필요)',count:seg.honsa_need||0,    color:'#6B7280'},
    {label:'2순위',          count:seg.p2,               color:'#2563EB'},
    {label:'3순위a',         count:seg.p3a,              color:'#3B82F6'},
    {label:'3순위b',         count:seg.p3b,              color:'#60A5FA'},
    {label:'추가',           count:seg.padd,             color:'#93C5FD'},
    {label:'4순위',          count:seg.p4,               color:'#7DD3FC'},
    {label:'별도',           count:seg.separate||14,     color:'#CBD5E1'},
  ];
  const total_remain=items.reduce((s,d)=>s+d.count,0);
  const subEl=ctx.closest('.chart-card')?.querySelector('.chart-sub');
  if(subEl) subEl.textContent=`전환 대기 잔여 합계 ${total_remain.toLocaleString()}개`;
  _chartBar=new Chart(ctx,{type:'bar',data:{
    labels:items.map(d=>d.label),
    datasets:[{data:items.map(d=>d.count),backgroundColor:items.map(d=>d.color),borderRadius:6,borderSkipped:false}]
  },options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.y.toLocaleString()}건`}},
      datalabels:{display:true,anchor:'end',align:'end',color:'#475569',font:{size:11,weight:'700'},formatter:v=>v>0?v.toLocaleString():''}},
    scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{callback:v=>v.toLocaleString()}},x:{grid:{display:false}}},
    layout:{padding:{top:20}}
  }});
}

// ── 모수 테이블 ──
function renderSegTable(seg, target){
  const nodeny=seg.nodeny_count||0;
  const showDiff=excludeNodeny&&_segAllBase;
  function diffBadge(curr,base){
    if(!showDiff||base===undefined) return '';
    const d=curr-base; if(d===0) return '';
    return `<span class="diff-badge">${d>0?'+':''}${d}</span>`;
  }
  const rows=[
    {key:'honsa_done',label:'0순위 (본사 완료)',count:seg.honsa_done,base:_segAllBase?.honsa_done,evo:'<span class="badge b-success">완료</span>',aff:'<span class="badge b-success">완료</span>',detail:'에볼루션 + 제휴 모두 완료',action:'상태 변화 모니터링 유지',bg:''},
    {key:'honsa_need',label:'0순위 (본사 필요)',count:seg.honsa_need,base:_segAllBase?.honsa_need,evo:'<span class="badge b-gray">혼재</span>',aff:'<span class="badge b-warning">필요</span>',detail:'에볼루션 또는 제휴 미완료',action:'별도 아웃콜 채널 운영',bg:''},
    {key:'done',label:'1순위 ✅ 완료',count:seg.done,base:_segAllBase?.done,evo:'<span class="badge b-success">ACTIVE</span>',aff:'<span class="badge b-success">ACTIVE</span>',detail:'전환 성공',action:'6월 이후 상태값 재점검',bg:'background:#f0fdf4'},
    {key:'p2',label:'2순위 (플랜A)',count:seg.p2,base:_segAllBase?.p2,evo:'<span class="badge b-success">ACTIVE</span>',aff:'<span class="badge b-primary">ELIGIBLE</span>',detail:'YPP 충족 · 제휴 미가입',action:'아웃콜 1회로 전환 가능',bg:''},
    {key:'p3a',label:'3순위a (플랜A)',count:seg.p3a,base:_segAllBase?.p3a,evo:'<span class="badge b-success">ACTIVE</span>',aff:'<span class="badge b-warning">UNSPECIFIED</span>',detail:'YPP 미충족 · 예외처리 필요',action:'예외 신청 후 즉시 연결',bg:''},
    {key:'p3b',label:'3순위b (플랜A)',count:seg.p3b,base:_segAllBase?.p3b,evo:'<span class="badge b-success">ACTIVE</span>',aff:'<span class="badge b-danger">PAUSED</span>',detail:'제휴 프로그램 일시 중단',action:'중단 사유 확인 · 재활성화',bg:''},
    {key:'padd',label:'추가 (플랜A)',count:seg.padd,base:_segAllBase?.padd,evo:'<span class="badge b-success">ACTIVE</span>',aff:'<span class="badge b-gray">미확인</span>',detail:'제휴 상태값 없음',action:'상태값 확인 후 2·3순위 재편입',bg:''},
    {key:'p4',label:'4순위 (플랜B)',count:seg.p4,base:_segAllBase?.p4,evo:'<span class="badge b-danger">UNSTABLE</span>',aff:'<span class="badge b-gray">전체</span>',detail:`연동 이슈 · 우선타겟 ${seg.p4_target}개`,action:'에볼루션 오류 해소 후 제휴 연계',bg:'background:#fffbeb'},
    {key:'separate',label:'별도 (DB 미매칭)',count:seg.separate||14,base:14,evo:'<span class="badge b-gray">-</span>',aff:'<span class="badge b-gray">-</span>',detail:'mall_id + shop_no 매칭 불가',action:'담당자 직접 확인',bg:'background:#f8fafc'},
  ];
  const mainRows=rows.map(r=>{
    const pct=(r.count/target*100).toFixed(1);
    const diff=diffBadge(r.count,r.base);
    const color=SEG_COLORS[r.key]||'#2563EB';
    const checked=checkedRows.has(r.key)?'checked':'';
    return `<tr id="row_${r.key}" style="${r.bg}${checkedRows.has(r.key)?';background:#EFF6FF !important':''}">
      <td><input type="checkbox" class="row-check" ${checked} onchange="toggleRowCheck('${r.key}')"></td>
      <td><b>${r.label}</b></td>
      <td><span class="seg-count" style="color:${color}">${r.count.toLocaleString()}</span>${diff}</td>
      <td>${r.evo}</td><td>${r.aff}</td>
      <td style="font-size:12px;color:#475569">${r.detail}</td>
      <td style="font-size:12px;color:#475569">${r.action}</td>
      <td style="font-size:12px;font-weight:700;color:${color}">${pct}%</td>
    </tr>`;
  }).join('');
  const nodenyRow=excludeNodeny?`<tr class="nodeny-row">
    <td></td><td><b>⚠️ 미동의 차단 예정 총 대상</b></td>
    <td><span class="seg-count minus">-${nodeny.toLocaleString()}</span></td>
    <td><span class="badge b-warning">변경예정</span></td><td><span class="badge b-gray">해당없음</span></td>
    <td style="font-size:12px;color:#92400E">6/1 이후 에볼루션 데이터 삭제 대상</td>
    <td style="font-size:12px;color:#92400E">즉시 아웃콜 → 동의 유도</td>
    <td style="font-size:12px;font-weight:700;color:#DC2626">-${(nodeny/target*100).toFixed(1)}%</td>
  </tr>`:'';
  document.getElementById('segBody').innerHTML=mainRows+nodenyRow;
}

// ── 초기 렌더 ──
function render(segBase, segExcluded, kpiTarget, isSample, snapshots){
  _segBase=segBase; _segExcluded=segExcluded; _seg=segBase;
  _kpiTarget=kpiTarget; allSnapshots=snapshots;
  const seg=_seg;
  const initDone=seg.done+(seg.honsa_done||0);
  const remaining=kpiTarget-initDone;
  const planACover=seg.plan_a>0?Math.min((seg.plan_a/Math.max(remaining,1)*100),100).toFixed(0):0;
  const convRate=(initDone/kpiTarget*100).toFixed(1);

  document.getElementById('app').innerHTML=`
    ${isSample?'<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:10px;padding:9px 14px;font-size:12px;color:#92400E;font-weight:600;margin-bottom:16px;">⚠️ 샘플 데이터로 표시 중</div>':''}

    <!-- ① KPI 현황 -->
    <div class="dash-section">
      <div class="dash-section-header">
        <div class="dash-section-title">KPI 현황</div>
        <div class="filter-ctrl">
          <button class="scope-btn active" data-scope="all"    onclick="setScope('all')">전체</button>
          <button class="scope-btn"        data-scope="center" onclick="setScope('center')">센터</button>
          <button class="scope-btn"        data-scope="honsa"  onclick="setScope('honsa')">본사</button>
        </div>
      </div>
      <div class="dash-section-body">
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">KPI 목표</div>
            <div class="kpi-value blue">${kpiTarget.toLocaleString()}건</div>
            <div class="kpi-sub">6~12월 · Evolution + Affiliate ACTIVE</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label" id="kpiDoneLabel">활성화 완료 (전체)</div>
            <div class="kpi-value green" id="kpiDone">${initDone.toLocaleString()}건</div>
            <div class="kpi-sub" id="kpiDoneSub">KPI 대비 ${(initDone/kpiTarget*100).toFixed(1)}%</div>
            <div class="progress-track"><div class="progress-fill green" id="kpiDoneBar" style="width:${Math.min(initDone/kpiTarget*100,100)}%"></div></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label" id="kpiCard3Label">담당 전환율</div>
            <div class="kpi-value blue" id="kpiCard3Value">${convRate}%</div>
            <div class="kpi-sub" id="kpiCard3Sub">전체 KPI ${kpiTarget.toLocaleString()}건 기준</div>
            <div class="progress-track"><div class="progress-fill blue" id="kpiCard3Bar" style="width:${Math.min(convRate,100)}%"></div></div>
          </div>
          <div class="kpi-card" id="kpiPlanACard">
            <div class="kpi-label" id="kpiCard4Label">플랜A 잔여 커버율</div>
            <div class="kpi-value orange" id="kpiPlanA">${planACover}%</div>
            <div class="kpi-sub" id="kpiPlanASub">플랜A ${seg.plan_a.toLocaleString()}건 → 잔여 ${remaining.toLocaleString()}건 대비</div>
            <div class="progress-track"><div class="progress-fill orange" id="kpiPlanABar" style="width:${planACover}%"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ② KPI 달성 추이 -->
    <div class="dash-section">
      <div class="dash-section-header">
        <div class="dash-section-title">추이 · 현황 분포</div>
        <div class="filter-ctrl">
          <div class="avg-badge" id="recentAvg" style="display:none"></div>
          <button class="period-btn" data-period="daily"   onclick="setPeriod('daily')">일별</button>
          <button class="period-btn active" data-period="weekly" onclick="setPeriod('weekly')">주별</button>
          <button class="period-btn" data-period="monthly" onclick="setPeriod('monthly')">월별</button>
          <div class="date-range-wrap">
            <button class="date-range-btn" onclick="toggleDatePicker()">📅 기간 선택</button>
            <div class="date-picker-popup" id="datePickerPopup">
              <div class="dp-row"><span class="dp-label">시작</span><input class="dp-input" type="date" id="dpFrom" min="2026-05-01" max="2026-12-31" value="2026-05-01"></div>
              <div class="dp-row"><span class="dp-label">종료</span><input class="dp-input" type="date" id="dpTo" min="2026-05-01" max="2026-12-31" value="2026-12-31"></div>
              <div class="dp-actions">
                <button class="dp-btn dp-cancel" onclick="closeDatePicker()">취소</button>
                <button class="dp-btn dp-apply"  onclick="applyDateRange()">적용</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="dash-section-body">
        <div class="chart-grid">
          <div class="chart-card">
            <div class="chart-title">KPI 달성 추이</div>
            <div class="chart-sub">완료 건수 vs 목표선 ${kpiTarget.toLocaleString()}건</div>
            <div class="chart-wrap"><canvas id="chartKPI"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-title">전환 대기 잔여 모수</div>
            <div class="chart-sub">전환 대기 잔여 합계 -건</div>
            <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ③ 탑머천트 리드 상태별 모수 -->
    <div class="dash-section">
      <div class="dash-section-header">
        <div class="dash-section-title">탑머천트 리드 상태별 모수</div>
        <div class="filter-ctrl">
          <label class="nodeny-toggle" id="nodenyToggle" for="nodenyCheckbox">
            <input type="checkbox" id="nodenyCheckbox" onchange="toggleNodeny()">
            <span class="nodeny-toggle-label">미동의 차단 반영</span>
          </label>
        </div>
      </div>
      <div class="selection-toolbar">
        <div id="toolbarHint" style="display:flex;align-items:center;gap:8px;flex:1">
          <span class="toolbar-hint">행 앞 체크박스를 선택하면 선택한 모수의 합계를 확인할 수 있습니다</span>
          <button class="btn-sm" onclick="selectAllRows()">전체 선택</button>
        </div>
        <div id="toolbarInfo" style="display:none;align-items:center;gap:10px;flex:1;flex-wrap:wrap">
          <span class="toolbar-count" id="toolbarCount"></span>
          <span class="toolbar-total" id="toolbarTotal"></span>
          <span class="toolbar-detail" id="toolbarDetail"></span>
          <button class="btn-sm danger" onclick="clearAllChecks()">선택 해제</button>
        </div>
      </div>
      <table class="seg-table">
        <colgroup><col style="width:36px"><col style="width:150px"><col style="width:90px"><col style="width:90px"><col style="width:120px"><col style="width:280px"><col style="width:220px"><col style="width:80px"></colgroup>
        <thead>
          <tr><th></th><th>우선순위</th><th>대상 수</th><th>에볼루션</th><th>제휴</th><th>상태 상세</th><th>필요 액션</th><th>KPI 대비</th></tr>
        </thead>
        <tbody id="segBody"></tbody>
      </table>
    </div>
  `;

  renderTrendChart(snapshots);
  renderBarChart(seg);
  renderSegTable(seg, kpiTarget);
  document.addEventListener('click', e=>{if(!e.target.closest('.date-range-wrap')) closeDatePicker();});
}

// ── 전체 데이터 재로드 (미동의 토글 시 차트/테이블용) ──
function reloadAllData() {
  Promise.all([
    fetch(apiUrl('/api/segments?scope=all&exclude_nodeny=false')).then(r=>r.json()),
    fetch(apiUrl('/api/segments?scope=all&exclude_nodeny=true')).then(r=>r.json()),
  ]).then(([base, excl]) => {
    _segAllBase     = base.segments;
    _segAllExcluded = excl.segments;
    const allSeg = excludeNodeny ? _segAllExcluded : _segAllBase;
    renderBarChart(allSeg);
    renderSegTable(allSeg, _kpiTarget);
    updateToolbar();
  }).catch(console.error);
}

// ── 초기 로드 ──
Promise.all([
  fetch(apiUrl('/api/segments?scope=all&exclude_nodeny=false')).then(r=>r.json()),
  fetch(apiUrl('/api/segments?scope=all&exclude_nodeny=true')).then(r=>r.json()),
  fetch(apiUrl('/api/history')).then(r=>r.json()),
]).then(([base,excl,hist])=>{
  // all 기준 데이터 저장 (차트/테이블 전용)
  _segAllBase     = base.segments;
  _segAllExcluded = excl.segments;
  render(base.segments,excl.segments,base.kpi_target,base.is_sample,hist.snapshots||[]);
}).catch(err=>{
  document.getElementById('app').innerHTML=`<div style="padding:40px;color:#DC2626;font-size:13px;">로드 실패: ${err.message}</div>`;
});
</script>
</body>
</html>
