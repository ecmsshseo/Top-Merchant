<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Top Merchant 현황 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f4fa;--surface:#fff;--border:#e4eaf5;--border-light:#eef2fb;
  --primary:#2563EB;--primary-light:#EFF6FF;
  --success:#16A34A;--warning:#D97706;--danger:#DC2626;
  --text-primary:#0f2747;--text-secondary:#475569;--text-muted:#94A3B8;
  --sidebar-w:220px;--header-h:56px;--radius-sm:10px;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);font-size:14px;height:100vh;overflow:hidden;}
.layout{display:flex;height:100vh;}

/* 사이드바 */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 20px 14px;border-bottom:1px solid var(--border-light);}
.logo-title{font-size:13px;font-weight:800;color:var(--primary);letter-spacing:-.02em;line-height:1.3;}
.logo-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;padding:8px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all .15s;text-decoration:none;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--primary-light);color:var(--primary);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:700;}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;font-size:10px;background:#e2e8f0;color:var(--text-muted);border-radius:99px;padding:1px 7px;font-weight:700;}

/* 사이드바 하단 링크 버튼 */
.sidebar-links{padding:10px;border-top:1px solid var(--border-light);}
.link-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;color:var(--text-secondary);text-decoration:none;transition:all .15s;margin-bottom:4px;border:1px solid var(--border);background:var(--surface);}
.link-btn:hover{background:var(--primary-light);color:var(--primary);border-color:#BFDBFE;}
.link-btn-icon{font-size:14px;}

/* 사이드바 푸터 */
.sidebar-footer{padding:10px 16px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-muted);}
.last-updated{display:flex;align-items:center;gap:6px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0;}
.status-dot.loading{background:var(--warning);animation:pulse 1s infinite;}
.status-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 메인 */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;flex:1;}
.topbar-title span{font-weight:400;color:var(--text-muted);font-size:13px;margin-left:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--primary);color:white;}.btn-primary:hover{background:#1d4ed8;}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.sample-tag{font-size:11px;background:#FEF3C7;color:#92400E;padding:4px 10px;border-radius:99px;font-weight:700;display:none;}
.sample-tag.show{display:inline-block;}
.page-container{flex:1;overflow:hidden;}
.page-frame{width:100%;height:100%;border:none;display:block;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">Top Merchant<br>현황 대시보드</div>
      <div class="logo-sub">YouTube Shopping TF</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">메인</div>
      <button class="nav-item active" data-page="overview" data-title="현황 대시보드" data-sub="KPI · 추이 · 리드 상태별 모수">
        <span class="nav-icon">📊</span> 현황 대시보드
      </button>
      <div class="nav-section-label" style="margin-top:8px">분석</div>
      <button class="nav-item" data-page="explorer" data-title="리드 탐색기" data-sub="항목·상태 필터로 리드 검색">
        <span class="nav-icon">🔍</span> 리드 탐색기
      </button>
      <div class="nav-section-label" style="margin-top:8px">참고</div>
      <button class="nav-item" data-page="status-guide" data-title="상태 안내" data-sub="에볼루션·제휴 상태값 설명">
        <span class="nav-icon">📋</span> 상태 안내
      </button>
      <button class="nav-item" data-page="scenario" data-title="안내 시나리오" data-sub="고객 상태별 안내 시나리오">
        <span class="nav-icon">💬</span> 안내 시나리오
        <span class="nav-badge">준비중</span>
      </button>
    </nav>

    <!-- 하단 링크 버튼 -->
    <div class="sidebar-links">
      <a class="link-btn" href="https://docs.google.com/spreadsheets/d/1pVACkM4qW-GMrENJ-qxObdZTCprl-bOBseqrm0uIPEg/edit" target="_blank">
        <span class="link-btn-icon">📊</span> 리드 시트 열기
      </a>
      <a class="link-btn" href="https://docs.google.com/presentation/d/1eP-MKlXBWkfhFXHv2RfUsmKDy4cqbKQnf0xkvxFVUfQ/edit" target="_blank">
        <span class="link-btn-icon">📑</span> 셋업 가이드
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="last-updated">
        <div class="status-dot loading" id="statusDot"></div>
        <span id="statusText">로딩 중...</span>
      </div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title" id="topbarTitle">
        현황 대시보드 <span id="topbarSub">KPI · 추이 · 리드 상태별 모수</span>
      </div>
      <span class="sample-tag" id="sampleTag">샘플 데이터</span>
      <button class="btn btn-primary" id="btnRefresh" onclick="handleRefresh()">↻ 새로고침</button>
    </header>
    <div class="page-container">
      <iframe id="pageFrame" class="page-frame" src="/overview"></iframe>
    </div>
  </div>
</div>
<script>
document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item[data-page]').forEach(b => b.classList.toggle('active', b===btn));
    document.getElementById('pageFrame').src = '/' + btn.dataset.page;
    document.getElementById('topbarTitle').innerHTML =
      `${btn.dataset.title} <span id="topbarSub">${btn.dataset.sub}</span>`;
  });
});
function handleRefresh() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true; btn.textContent = '갱신 중...';
  fetch('/api/refresh').finally(() => {
    setTimeout(() => {
      document.getElementById('pageFrame').contentWindow.location.reload();
      btn.disabled = false; btn.textContent = '↻ 새로고침';
      pollStatus();
    }, 2000);
  });
}
function pollStatus() {
  fetch('/api/segments')
    .then(r => r.json())
    .then(d => {
      document.getElementById('statusDot').className = 'status-dot';
      document.getElementById('statusText').textContent = d.updated_at ? d.updated_at.slice(11,16)+' 기준' : '업데이트 완료';
      document.getElementById('sampleTag').classList.toggle('show', !!d.is_sample);
    })
    .catch(() => {
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('statusText').textContent = '연결 오류';
    });
}
// 최초 1회만 상태 확인
pollStatus();
</script>
</body>
</html>
