<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>안내 시나리오</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:#f0f4fa;color:#0f2747;font-size:14px;padding:24px;overflow-y:auto;}

.section-title{font-size:15px;font-weight:800;color:#0f2747;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::before{content:'';width:5px;height:20px;background:#2563EB;border-radius:99px;flex-shrink:0;}

.coming-card{background:#fff;border:1px solid #e4eaf5;border-radius:16px;padding:48px 24px;box-shadow:0 2px 8px rgba(15,39,71,.05);text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;}
.coming-icon{font-size:48px;}
.coming-title{font-size:16px;font-weight:800;}
.coming-desc{font-size:13px;color:#64748B;line-height:1.8;max-width:420px;}

.preview{margin-top:8px;width:100%;max-width:560px;background:#f7f9fd;border:1px solid #e4eaf5;border-radius:12px;padding:18px 20px;text-align:left;}
.preview-label{font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.s-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:8px;font-size:12px;}
.s-item:last-child{margin-bottom:0;}
.s-eligible{background:#EFF6FF;} .s-unspec{background:#FEF3C7;} .s-unstable{background:#FEE2E2;} .s-nodeny{background:#DCFCE7;}
.s-icon{font-size:16px;} .s-title{font-weight:700;flex:1;}
.s-tag{font-size:10px;background:rgba(255,255,255,.7);padding:2px 8px;border-radius:99px;font-weight:700;}
</style>
</head>
<body>

<div class="section-title">안내 시나리오</div>

<div class="coming-card">
  <div class="coming-icon">💬</div>
  <div class="coming-title">고객 상태별 안내 시나리오</div>
  <div class="coming-desc">
    고객의 에볼루션 · 제휴 상태에 따른 아웃콜 안내 스크립트와<br>
    단계별 대응 시나리오를 등록할 수 있는 공간입니다.<br>
    준비 중입니다.
  </div>
  <div class="preview">
    <div class="preview-label">등록 예정 시나리오</div>
    <div class="s-item s-eligible"><span class="s-icon">✅</span><span class="s-title">2순위 — ACTIVE + ELIGIBLE</span><span class="s-tag">아웃콜 1회</span></div>
    <div class="s-item s-unspec"><span class="s-icon">⚠️</span><span class="s-title">3순위 — ACTIVE + UNSPECIFIED (YPP 미충족)</span><span class="s-tag">예외 신청</span></div>
    <div class="s-item s-unspec"><span class="s-icon">⏸️</span><span class="s-title">3순위 — ACTIVE + PAUSED (일시 중단)</span><span class="s-tag">재활성화</span></div>
    <div class="s-item s-unstable"><span class="s-icon">🔧</span><span class="s-title">4순위 — UNSTABLE (연동 오류)</span><span class="s-tag">오류 조치</span></div>
    <div class="s-item s-nodeny"><span class="s-icon">❌</span><span class="s-title">약관 미동의 고객</span><span class="s-tag">동의 유도 → 재온보딩</span></div>
  </div>
</div>

</body>
</html>
